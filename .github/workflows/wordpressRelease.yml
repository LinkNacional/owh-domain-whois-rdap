name: Deploy Plugin to WordPress.org

on:
  workflow_dispatch:

env:
  PLUGIN_NAME: owh-domain-whois-rdap
  PHP_VERSION: "7.4"
  DEPLOY_TAG: "1.2.4"

jobs:
  deploy-to-wp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch main
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Run composer install
        uses: php-actions/composer@v6
        with:
          php_version: ${{ env.PHP_VERSION }}
          working_dir: "."
          args: --ignore-platform-reqs
          command: install
          dev: no

      - name: Set safe Git directory
        run: git config --global --add safe.directory /app

      - name: Prepare plugin folder
        run: |
          mkdir -p build/${{ env.PLUGIN_NAME }}
          mv ./admin ./data ./includes ./public ./src *.php *.txt ./build/${{ env.PLUGIN_NAME }}
          [ -d ./languages ] && mv ./languages ./build/${{ env.PLUGIN_NAME }}
          [ -d ./templates ] && mv ./templates ./build/${{ env.PLUGIN_NAME }}
          cp -r vendor build/${{ env.PLUGIN_NAME }}/vendor
          find ./build -type f -exec chmod 0644 {} +
          find ./build -type d -exec chmod 0755 {} +

      - name: Deploy para WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          VERSION: ${{ env.DEPLOY_TAG }}
          SLUG: owh-domain-whois-rdap
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          ASSETS_DIR: build/${{ env.PLUGIN_NAME }}/includes/assets/WordpressAssets
          BUILD_DIR: build/${{ env.PLUGIN_NAME }}